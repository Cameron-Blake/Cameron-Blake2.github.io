<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cameron's Recipe Collection</title>
  <link href="https://fonts.googleapis.com/css?family=Oswald:300,700|Varela+Round" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style2.css">
</head>
<body>

<main>

  <header>
    <div class="grid-example">
      <ul>
        <li><a href="homepage.html">Homepage</a></li>
        <li><a href="recipes.html">Recipes</a></li>
        <li><a href="submissions.html">Submissions</a></li>
      </ul>
	</div>
  </header>
  

  
  <div class="welcome">
    <h1><strong>Submit a new recipe</strong></h1>
    <p>We look forward to seeing your favorite recipes!</p>
  </div>

 <!-- Form with multiple field sets -->
<form id="recipeForm" class="recipe-form">

  <fieldset>
    <legend>Recipe Information</legend>

    <!-- Requirement: text input -->
    <label for="recipeName">Recipe Name:</label>
    <input type="text" id="recipeName" name="recipeName" required>

    <!-- Requirement: date/time input -->
    <label for="prepDate">Date Created:</label>
    <input type="date" id="prepDate" name="prepDate">

    <!-- Requirement: mobile keyboard type (email) -->
    <label for="email">Your Email:</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required>
  </fieldset>

  <fieldset>
    <legend>Recipe Preferences</legend>

    <!-- Requirement: radio buttons -->
    <p>Difficulty:</p>
    <label><input type="radio" name="difficulty" value="Easy"> Easy</label>
    <label><input type="radio" name="difficulty" value="Medium"> Medium</label>
    <label><input type="radio" name="difficulty" value="Hard"> Hard</label>

    <!-- Requirement: spinner (number input) -->
    <label for="servings">Servings:</label>
    <input type="number" id="servings" name="servings" min="1" max="20">

    <!-- Requirement: range slider -->
    <label for="spiceLevel">Spice Level:</label>
    <input type="range" id="spiceLevel" name="spiceLevel" min="0" max="10">

    <!-- Requirement: checkboxes -->
    <p>Meal Type:</p>
    <label><input type="checkbox" name="meal[]" value="Breakfast"> Breakfast</label>
    <label><input type="checkbox" name="meal[]" value="Lunch"> Lunch</label>
    <label><input type="checkbox" name="meal[]" value="Dinner"> Dinner</label>
    <label><input type="checkbox" name="meal[]" value="Dessert"> Dessert</label>
  </fieldset>

  <!-- SELECTION LIST -->
  <label for="category">Recipe Category:</label>
  <select id="category" name="category">
    <option value="comfort">Comfort Food</option>
    <option value="healthy">Healthy</option>
    <option value="quick">Quick & Easy</option>
    <option value="holiday">Holiday</option>
  </select>


  <!-- TEXT AREA -->
  <label for="instructions">Recipe Instructions:</label>
  <textarea id="instructions" name="instructions" rows="6" required></textarea>


  <!-- PATTERN VALIDATION -->
  <label for="cookTime">Cook Time (HH:MM):</label>
  <input type="text" id="cookTime" name="cookTime"
         pattern="^[0-9]{2}:[0-9]{2}$"
         placeholder="00:00"
         required>


  <!-- DATALIST -->
  <label for="ingredient">Main Ingredient:</label>
  <input list="ingredientList" id="ingredient" name="ingredient">
  <datalist id="ingredientList">
    <option value="Chicken">
    <option value="Beef">
    <option value="Pasta">
    <option value="Vegetables">
    <option value="Fruit">
  </datalist>


  <!-- SUBMIT + RESET BUTTONS -->
  <button type="submit">Submit Recipe</button>
  <button type="reset">Reset Form</button>

</form>

  
  
  
</main>  
  
  <footer>
    <h3>Thank you for visiting my website! &copy; 2026</h3>
  </footer>

</body>
</html>
